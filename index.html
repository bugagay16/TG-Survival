<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Survival</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; overflow:hidden; }
        #app { max-width:500px; margin:0 auto; }
        .header { padding:20px 15px; background:#111; }
        .header h1 { margin:0; font-size:28px; font-weight:bold; }
        .header p { margin:5px 0 0; color:#aaa; font-size:15px; }
        .cards { padding:15px; display:flex; flex-direction:column; gap:15px; }
        .card {
            background:#1f1f1f; border-radius:16px; padding:20px; text-align:left;
            box-shadow:0 4px 15px rgba(0,0,0,0.4); cursor:pointer; transition:0.2s;
        }
        .card:hover { transform:scale(1.03); }
        .card h2 { margin:0 0 8px; font-size:22px; color:#00ffaa; }
        .card p { margin:0; color:#ccc; font-size:15px; line-height:1.4; }
        .modal {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95);
            display:none; align-items:center; justify-content:center; z-index:100;
        }
        .modal-content {
            background:#1f1f1f; width:90%; max-width:460px; border-radius:16px; padding:20px;
            max-height:85vh; overflow-y:auto;
        }
        .modal-header { font-size:20px; margin-bottom:15px; color:#00ffaa; }
        .close-btn { float:right; font-size:28px; cursor:pointer; color:#777; }
        .proxy-item, .alert-item {
            background:#2a2a2a; padding:12px; margin:8px 0; border-radius:10px;
            font-size:15px; display:flex; justify-content:space-between; align-items:center;
        }
        .copy-btn { background:#00ccff; color:#000; padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🛡️ TG Survival</h1>
            <p>Прокси • Алёрты • Бэкап</p>
        </div>

        <div class="cards">
            <div class="card" onclick="showModal(1)">
                <h2>🔑 Прокси</h2>
                <p>Свежие MTProto-сервера. Работают даже при сильных блокировках.</p>
            </div>
            <div class="card" onclick="showModal(2)">
                <h2>🚨 Алёрты</h2>
                <p>Что заблокировали сегодня + что делать прямо сейчас.</p>
            </div>
            <div class="card" onclick="showModal(3)">
                <h2>💾 Бэкап чатов</h2>
                <p>Как сохранить переписку перед блокировкой аккаунта.</p>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="modal" class="modal" onclick="if(event.target.id==='modal') hideModal()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <span class="close-btn" onclick="hideModal()">×</span>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp || { ready:()=>{}, expand:()=>{} };
        tg.ready(); tg.expand();

        function showModal(type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');

            if (type === 1) { // Прокси
                content.innerHTML = `
                    <div class="modal-header">🔑 Свежие прокси (23 марта 2026)</div>
                    <div class="proxy-item">MTProto • 195.2.78.126:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=195.2.78.126&port=443')">Копировать</span></div>
                    <div class="proxy-item">MTProto • 91.107.172.155:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=91.107.172.155&port=443')">Копировать</span></div>
                    <div class="proxy-item">MTProto • 178.20.43.19:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=178.20.43.19&port=443')">Копировать</span></div>
                    <div class="proxy-item">MTProto • 8443.link-a4.ir:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=8443.link-a4.ir&port=443')">Копировать</span></div>
                    <div class="proxy-item">MTProto • telegram.innocom.co:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=telegram.innocom.co&port=443')">Копировать</span></div>
                    <div class="proxy-item">MTProto • slark.shukafish.ru:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=slark.shukafish.ru&port=443')">Копировать</span></div>
                `;
            } 
            else if (type === 2) { // Алёрты
                content.innerHTML = `
                    <div class="modal-header">🚨 Алёрты блокировок</div>
                    <div class="alert-item">23.03 — Заблокирован канал NavalnyLive</div>
                    <div class="alert-item">22.03 — Заблокирован бот @freedomru</div>
                    <div class="alert-item">21.03 — Замедлен трафик в Москве и СПб</div>
                    <div class="alert-item">20.03 — Блокировка 12 оппозиционных каналов</div>
                    <p style="color:#aaa; font-size:13px; margin-top:15px;">Обновляется каждый день. Используй прокси выше.</p>
                `;
            } 
            else if (type === 3) { // Бэкап
                content.innerHTML = `
                    <div class="modal-header">💾 Как сделать бэкап чатов</div>
                    <p><strong>Шаг 1:</strong> Перейди по ссылке ниже и запусти бота</p>
                    <p><strong>Шаг 2:</strong> Напиши /export и выбери чаты</p>
                    <p><strong>Шаг 3:</strong> Файлы сохранятся в «Избранное»</p>
                    <button onclick="window.open('https://t.me/BackupBot','_blank')" style="width:100%; padding:15px; background:#00ccff; color:#000; border:none; border-radius:12px; font-weight:bold; margin-top:15px;">Запустить бота-экспортёр</button>
                `;
            }

            modal.style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function copyProxy(link) {
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ Ссылка скопирована!\nВставь в Настройки → Данные и память → Прокси');
            });
        }

        // Автоматическое расширение
        tg.expand();
    </script>
</body>
</html>
