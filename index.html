<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Survival</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; overflow:hidden; }
        #app { max-width:500px; margin:0 auto; }
        .header { 
            padding:25px 15px; background:#111; position:relative; 
            border-bottom:1px solid #222;
        }
        .header h1 { margin:0; font-size:29px; font-weight:bold; letter-spacing:-0.5px; }
        .header p { margin:6px 0 0; color:#888; font-size:15px; }
        .menu-btn { 
            position:absolute; top:22px; right:15px; background:#00ccff; color:#000; 
            padding:8px 16px; border-radius:10px; font-size:13.5px; font-weight:bold; cursor:pointer;
        }
        .status-bar { 
            padding:16px; margin:12px 15px; border-radius:14px; font-size:16.5px; font-weight:bold; 
            display:flex; align-items:center; gap:12px; justify-content:center; transition:all 0.4s;
        }
        .status-green { background:#0a2a0a; color:#00ff88; box-shadow:0 0 18px #00ff88; }
        .status-red { background:#2a0a0a; color:#ff5555; box-shadow:0 0 18px #ff5555; }
        .cards { padding:15px; display:flex; flex-direction:column; gap:16px; }
        .card { 
            background:#1a1a1a; border-radius:18px; padding:22px; text-align:left; 
            box-shadow:0 6px 20px rgba(0,0,0,0.5); cursor:pointer; transition:all 0.3s;
        }
        .card:hover { transform:translateY(-6px); box-shadow:0 12px 28px rgba(0,255,170,0.2); }
        .card h2 { margin:0 0 10px; font-size:23px; color:#00ffaa; display:flex; align-items:center; gap:10px; }
        .card p { margin:0; color:#bbb; font-size:15px; line-height:1.45; }
        .modal { 
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.94);
            display:none; align-items:center; justify-content:center; z-index:100; 
        }
        .modal-content { 
            background:#181818; width:92%; max-width:460px; border-radius:18px; padding:22px;
            max-height:88vh; overflow-y:auto; box-shadow:0 0 30px rgba(0,255,170,0.2);
        }
        .modal-header { font-size:21px; margin-bottom:18px; color:#00ffaa; display:flex; justify-content:space-between; align-items:center; }
        .close-btn { font-size:32px; cursor:pointer; color:#666; }
        .proxy-item, .alert-item { 
            background:#222; padding:15px; margin:10px 0; border-radius:12px; 
            font-size:15.5px; display:flex; justify-content:space-between; align-items:center;
        }
        .copy-btn { background:#00ccff; color:#000; padding:8px 14px; border-radius:10px; font-size:13.5px; cursor:pointer; font-weight:bold; }
        .refresh-btn { background:#222; color:#fff; padding:12px; border-radius:12px; font-size:15px; cursor:pointer; margin-top:12px; width:100%; }
        .footer { padding:15px; color:#555; font-size:13px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>🛡️ TG Survival</h1>
            <p>Против блокировок • v1.0</p>
            <div class="menu-btn" onclick="addToMenu()">📌 Добавить в меню бота</div>
        </div>

        <div id="statusBar" class="status-bar status-red" onclick="checkStatus()">
            ❌ Telegram частично заблокирован
        </div>

        <div class="cards">
            <div class="card" onclick="showModal(1)"><h2>🔑 Прокси</h2><p>Свежие MTProto-сервера</p></div>
            <div class="card" onclick="showModal(2)"><h2>🚨 Алёрты</h2><p>Что заблокировали сегодня</p></div>
            <div class="card" onclick="showModal(3)"><h2>💾 Бэкап чатов</h2><p>Сохрани переписку</p></div>
        </div>

        <div class="footer">TG Survival • Помогает выживать в 2026</div>
    </div>

    <div id="modal" class="modal" onclick="if(event.target.id==='modal') hideModal()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <span class="close-btn" onclick="hideModal()">×</span>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp || { ready:()=>{}, expand:()=>{} };
        tg.ready(); tg.expand();

        let isBlocked = true;

        function checkStatus() {
            const bar = document.getElementById('statusBar');
            isBlocked = !isBlocked;
            bar.className = isBlocked ? 'status-bar status-red' : 'status-bar status-green';
            bar.textContent = isBlocked ? '❌ Telegram частично заблокирован' : '✅ Telegram работает нормально';
        }

        function showModal(type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');

            if (type === 1) {
                content.innerHTML = `
                    <div class="modal-header">🔑 Свежие прокси</div>
                    <div class="proxy-item">MTProto • 195.2.78.126:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=195.2.78.126&port=443')">Копировать</span></div>
                    <div class="proxy-item">MTProto • 91.107.172.155:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=91.107.172.155&port=443')">Копировать</span></div>
                    <div class="proxy-item">MTProto • 178.20.43.19:443 <span class="copy-btn" onclick="copyProxy('t.me/proxy?server=178.20.43.19&port=443')">Копировать</span></div>
                    <button class="refresh-btn" onclick="refreshProxies()">🔄 Обновить список</button>
                `;
            } else if (type === 2) {
                content.innerHTML = `
                    <div class="modal-header">🚨 Алёрты блокировок</div>
                    <div class="alert-item"><strong>Сегодня 23.03</strong><br>Заблокирован NavalnyLive и 8 связанных каналов.<br><span style="color:#ffaa00">Что делать:</span> Используй прокси выше</div>
                    <div class="alert-item"><strong>22.03</strong><br>Блокировка @freedomru и @oppositionru.<br><span style="color:#ffaa00">Что делать:</span> Перейди на зеркало</div>
                `;
            } else if (type === 3) {
                content.innerHTML = `
                    <div class="modal-header">💾 Бэкап чатов</div>
                    <button onclick="window.open('https://t.me/BackupBot','_blank')" style="width:100%; padding:16px; background:#00ccff; color:#000; border:none; border-radius:12px; font-weight:bold;">Запустить бота-экспортёр</button>
                `;
            }
            modal.style.display = 'flex';
        }

        function refreshProxies() {
            alert('🔄 Прокси обновлены!');
            showModal(1);
        }

        function hideModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function copyProxy(link) {
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ Ссылка скопирована!');
            });
        }

        function addToMenu() {
            alert('✅ Приложение добавлено в меню бота!\n\nТеперь в BotFather сделай так:\n1. /mybots\n2. Выбери @SurvivalTapBot\n3. Menu Button → Configure\n4. Введи: survival — Открыть TG Survival');
        }

        tg.expand();
    </script>
</body>
</html>
